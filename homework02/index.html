<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles.css">
  <title>DOM Homework : Phone number validation</title>
</head>
<body>
  <h1>Phone Number validation</h1>
  <hr>
  <form id="phone-form">
    <label for="inp1">Phone number :</label>
    <input type="text" id="inp1">
    <button>Check</button>
    <p id="err-message">error</p>
  </form>

  <script src="./main.js"></script>
</body>
</html>

<!-- 
เมื่อ submit form (คลิกที่ปุ่ม Check)
- ถ้าผู้ใช้ไม่กรอกให้ขึ้นข้อความ Phone Number is required
- ถ้าผู้ใช้กรอกค่าที่ไม่ใช่ตัวเลขให้ขึ้นข้อความ Phone Number is invalid
- ถ้าผู้ใช้กรอกค่าที่มีความยาวไม่เท่ากับ 10 ให้ขึ้นข้อความ Invalid length
- ถ้ากรอกถูกต้องให้ Alert “Your number is valid”
-->
